[Plugin]
name    = View Distance
author  = DS2EP
version = 1.0
enabled = true

[Settings]
# DS2 world-space fog distances are sub-unit floats (near~0.001, far~0.35).
# We multiply the ORIGINAL values by these scales each frame.
# The proxy captures originals once (values below 5.0) then writes scaled
# values every BeginScene so DS2 can re-normalize them for D3D.
#
# With originals near~0.001 and far~0.35:
#   200x  -> near=0.2,  far=70   (still foggy at arm's reach)
#   2000x -> near=2,    far=700  (fog starts about camera-far)
#   20000x-> near=20,   far=7000 (near total clear)
#
# If fog_end_scale > 100, the proxy also disables D3DRS_FOGENABLE entirely
# for a clean fog-free look regardless of the normalized value clamping.
#
# Ctrl+click any slider in the menu to type exact values.
# Logarithmic slider: drag left for 1x, drag right for 50000x.

far_clip_scale  = 2000.0
fog_start_scale = 20000.0
fog_end_scale   = 20000.0
